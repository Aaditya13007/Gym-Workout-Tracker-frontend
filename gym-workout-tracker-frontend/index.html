<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gym Workout Tracker</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="topbar">
    <nav class="nav" aria-label="Main navigation">
      <a class="brand" href="index.html" aria-label="Gym Workout Tracker home">
        <span class="brand-mark" aria-hidden="true">GT</span>
        <span>Gym Tracker</span>
      </a>
      <div class="nav-links">
        <a class="nav-link active" href="index.html" aria-current="page">Home</a>
        <a class="nav-link" href="add-workout.html">Add Workout</a>
      </div>
    </nav>
  </header>

  <main class="app-shell">
    <section class="dashboard-head" aria-labelledby="page-title">
      <div>
        <p class="eyebrow">Training Log</p>
        <h1 id="page-title">Gym Workout Tracker</h1>
      </div>
      <a class="primary-action" href="add-workout.html">Add Workout</a>
    </section>

    <section class="metrics" aria-label="Workout summary">
      <article class="metric">
        <span class="metric-label">Workouts</span>
        <strong id="totalWorkouts">0</strong>
      </article>
      <article class="metric">
        <span class="metric-label">Minutes</span>
        <strong id="totalMinutes">0</strong>
      </article>
      <article class="metric">
        <span class="metric-label">Calories</span>
        <strong id="totalCalories">0</strong>
      </article>
      <article class="metric accent">
        <span class="metric-label">High Intensity</span>
        <strong id="highIntensity">0</strong>
      </article>
    </section>

    <section class="toolbar" aria-label="Workout filters">
      <label class="search-field">
        <span>Search</span>
        <input id="searchInput" type="search" placeholder="Name, muscle, notes">
      </label>

      <label>
        <span>Category</span>
        <select id="categoryFilter">
          <option value="">All categories</option>
          <option value="Strength">Strength</option>
          <option value="Cardio">Cardio</option>
          <option value="Mobility">Mobility</option>
          <option value="HIIT">HIIT</option>
          <option value="Recovery">Recovery</option>
        </select>
      </label>

      <label>
        <span>Intensity</span>
        <select id="intensityFilter">
          <option value="">All intensities</option>
          <option value="Low">Low</option>
          <option value="Medium">Medium</option>
          <option value="High">High</option>
        </select>
      </label>

      <label>
        <span>Sort</span>
        <select id="sortSelect">
          <option value="date_desc">Newest</option>
          <option value="duration_desc">Longest</option>
          <option value="calories_desc">Most calories</option>
          <option value="name_asc">Name A-Z</option>
        </select>
      </label>

      <button class="ghost-button" id="resetButton" type="button">Reset</button>
    </section>

    <section aria-live="polite">
      <div id="statusMessage" class="status-message">Loading workouts...</div>
      <div id="workoutList" class="workout-grid"></div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
